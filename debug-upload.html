<!DOCTYPE html>
<html>
<head>
    <title>Debug Upload</title>
</head>
<body>
    <h1>Debug Upload Test</h1>
    <form id="testForm">
        <input type="file" id="fileInput" accept="image/*">
        <button type="submit">Upload</button>
    </form>
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            alert(`File selected: ${file.name}`);
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch('http://localhost:3001/api/upload?folder=projects', {
                    method: 'POST',
                    body: formData,
                });
                
                const result = await response.json();
                alert(`Upload result: ${JSON.stringify(result)}`);
                document.getElementById('result').innerHTML = `
                    <p>Success! Image path: ${result.imagePath}</p>
                    <img src="${result.imagePath}" style="max-width: 300px;">
                `;
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        });
    </script>
</body>
</html>
