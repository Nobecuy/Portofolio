<!DOCTYPE html>
<html>
<head>
    <title>Test Upload Response</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Test Upload Server Response</h1>
    <form id="testForm">
        <input type="file" id="fileInput" accept="image/*" required>
        <select id="folderSelect">
            <option value="projects">Projects</option>
            <option value="skills">Skills</option>
        </select>
        <button type="submit">Upload & Test Response</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const folderSelect = document.getElementById('folderSelect');
            const file = fileInput.files[0];
            const folder = folderSelect.value;
            
            if (!file) {
                showResult('Please select a file', 'error');
                return;
            }
            
            showResult('Uploading...', 'info');
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                console.log('Sending request to:', `http://localhost:3001/api/upload?folder=${folder}`);
                console.log('FormData entries:', Array.from(formData.entries()));
                
                const response = await fetch(`http://localhost:3001/api/upload?folder=${folder}`, {
                    method: 'POST',
                    body: formData,
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const result = await response.json();
                console.log('Response body:', result);
                
                if (response.ok) {
                    showResult(`
                        <strong>✅ Success!</strong><br>
                        Image Path: ${result.imagePath}<br>
                        Full Response: <pre>${JSON.stringify(result, null, 2)}</pre>
                        <br>
                        <img src="${result.imagePath}" style="max-width: 200px; border: 1px solid #ccc;">
                    `, 'success');
                } else {
                    showResult(`
                        <strong>❌ Error!</strong><br>
                        Status: ${response.status}<br>
                        Error: ${result.error || 'Unknown error'}<br>
                        Full Response: <pre>${JSON.stringify(result, null, 2)}</pre>
                    `, 'error');
                }
            } catch (error) {
                console.error('Network error:', error);
                showResult(`
                    <strong>🔥 Network Error!</strong><br>
                    ${error.message}<br>
                    Make sure upload server is running on http://localhost:3001
                `, 'error');
            }
        });
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = message;
        }
    </script>
</body>
</html>
